# ============================================================================
# Raw AI — Zensical configuration
# Docs: https://zensical.org/docs/setup/basics/
# ============================================================================

[project]

site_name = "Raw AI"
site_description = ""
site_author = "Ville Vainio"
site_url = "https://vivainio.github.io/raw-ai/"

copyright = """
Copyright &copy; 2026 Ville Vainio
"""

# Source repository — enables the edit/view content actions below.
repo_url = "https://github.com/vivainio/raw-ai"
repo_name = "vivainio/raw-ai"

# Explicit navigation. Add sections here as the site grows.
nav = [
  { "Home" = "index.md" },
  { "Agent Skills" = [
    { "Overview" = "agent-skills/index.md" },
    { "Managing skills with skillset" = "agent-skills/skillset.md" },
    { "Skill + CLI instead of MCP" = "agent-skills/skill-vs-mcp.md" },
  ] },
  { "Agent Dialogue" = "agent-dialogue/index.md" },
  { "Agent Memory" = "agent-memory/index.md" },
  { "Theory: Machine Learning Before LLMs" = "machine-learning-before-llms/index.md" },
  { "Theory: Inference" = "inference/index.md" },
  { "Theory: Tokenization" = "tokenization/index.md" },
  { "Theory: Transformer Architecture" = "transformer-architecture/index.md" },
  { "RAG" = "rag/index.md" },
  { "Prompt Caching" = "llm-caching/index.md" },
  { "Hosting: AWS Bedrock" = "aws-bedrock/index.md" },
  { "Hosting: AWS AgentCore" = "aws-agentcore/index.md" },
  { "Models: Reading the Spec Sheet" = "reading-model-specs/index.md" },
  { "Models: Lineage and Licenses" = "model-lineage-licenses/index.md" },
  { "Frameworks: Pydantic AI" = "pydantic-ai/index.md" },
  { "Frameworks: Strands Agents" = "strands-agents/index.md" },
  { "Frameworks: Microsoft Agent Framework" = "microsoft-agent-framework/index.md" },
  { "Frameworks: Rolling Your Own" = "rolling-your-own/index.md" },
  { "The OpenAI API" = "openai-api/index.md" },
]

extra_css = ["stylesheets/extra.css"]

# ----------------------------------------------------------------------------
# Theme
# ----------------------------------------------------------------------------
[project.theme]
language = "en"
features = [
    "announce.dismiss",
    "content.action.edit",
    "content.action.view",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "content.tabs.link",
    "content.tooltips",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.path",
    "navigation.sections",
    "navigation.top",
    "navigation.tracking",
    "search.highlight",
]

[project.theme.icon]
logo = "lucide/brain-circuit"

[[project.theme.palette]]
scheme = "default"
primary = "indigo"
accent = "indigo"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "indigo"
accent = "indigo"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/vivainio/raw-ai"

# ----------------------------------------------------------------------------
# Markdown extensions
# ----------------------------------------------------------------------------
[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.arithmatex]
generic = true
[project.markdown_extensions.pymdownx.betterem]
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.magiclink]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
combine_header_slug = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
[project.markdown_extensions.pymdownx.tilde]
